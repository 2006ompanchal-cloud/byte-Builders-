<script>
// Show user info after login
function showUserInfo() {
    const currentUser = localStorage.getItem('currentUser');
    if (currentUser) {
        const user = JSON.parse(currentUser);
        document.getElementById('userInfo').style.display = 'block';
        document.getElementById('userName').textContent = user.name || user.email;
        document.getElementById('userEmail').textContent = user.email || '';
    }
}

// Logout function
document.getElementById('logoutBtn').addEventListener('click', function() {
    if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('currentUser');
        alert('Logged out successfully!');
        window.location.href = './login.html';
    }
});

// Show user info on page load
showUserInfo();
</script>

    <div class="main-content">
        <div class="page-header">
            <h1><i class="fas fa-file-invoice"></i> Create RFQ</h1>
            <p>Request for Quotation - Send requests to vendors for products or services</p>
        </div>

        <div class="form-container">
            <h3>RFQ Details</h3>
            <form onsubmit="addRFQ(event)">
                <div class="form-group">
                    <label><i class="fas fa-heading"></i> RFQ Title</label>
                    <input type="text" id="rfq-title" placeholder="Enter RFQ Title" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-info-circle"></i> Product / Service Details</label>
                    <textarea id="rfq-details" rows="4" placeholder="Describe the product or service in detail" required></textarea>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-box"></i> Quantity</label>
                    <input type="number" id="rfq-qty" min="1" placeholder="Enter Quantity" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-paperclip"></i> Upload Attachment</label>
                    <input type="file" id="rfq-attachment">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-calendar-alt"></i> Quotation Deadline</label>
                    <input type="date" id="rfq-deadline" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-user-tie"></i> Assign Vendor</label>
                    <select id="rfq-vendor" required>
                        <option value="">Select Vendor</option>
                        <option value="ABC Suppliers">ABC Suppliers</option>
                        <option value="XYZ Traders">XYZ Traders</option>
                        <option value="Global Tech">Global Tech</option>
                        <option value="Prime Industries">Prime Industries</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-check-circle"></i> Create RFQ
                </button>
            </form>
        </div>

        <div class="rfq-list-container">
            <h3><i class="fas fa-list"></i> RFQ List</h3>
            <ul id="rfqList">
                <!-- RFQ items will be added here dynamically -->
            </ul>
        </div>
    </div>

    <script src="C:\Users\Asus\OneDrive\Desktop\hackathon\static\script.js"></script>
    <script>
    function sendRFQ() {
        fetch("http://127.0.0.1:5000/rfq", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                item: document.getElementById("item").value,
                qty: document.getElementById("qty").value
            })
        })
        .then(res => res.json())
        .then(data => alert("RFQ Created!"));
    }

    function addRFQ(event) {
        event.preventDefault();
        
        const rfqData = {
            title: document.getElementById('rfq-title').value,
            details: document.getElementById('rfq-details').value,
            quantity: document.getElementById('rfq-qty').value,
            deadline: document.getElementById('rfq-deadline').value,
            vendor: document.getElementById('rfq-vendor').value
        };

        // Add RFQ to list
        const rfqList = document.getElementById('rfqList');
        const rfqItem = document.createElement('li');
        rfqItem.innerHTML = `
            <div class="rfq-item-title">${rfqData.title}</div>
            <div class="rfq-item-details">
                ${rfqData.details} | Quantity: ${rfqData.quantity} | Vendor: ${rfqData.vendor} | Deadline: ${rfqData.deadline}
            </div>
        `;
        rfqList.appendChild(rfqItem);

        // Show success message
        alert('RFQ Created Successfully!');
        
        // Reset form
        event.target.reset();
    }
    </script>
