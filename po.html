    <!-- User Info (shows after login) -->
    <div id="userInfo" style="padding: 15px; background: #2a3850; border-radius: 8px; margin-bottom: 20px; display: none;">
        <p id="userName" style="font-weight: 600; margin-bottom: 5px;"></p>
        <p id="userEmail" style="font-size: 12px; color: #00c2ff;"></p>
    </div>

    <a href="./index.html"><i class="fas fa-home"></i> Dashboard</a>
    <a href="./vendors.html"><i class="fas fa-users"></i> Vendors</a>
    <a href="./rfq.html"><i class="fas fa-file-invoice"></i> RFQ</a>
    <a href="./quotations.html"><i class="fas fa-clipboard-list"></i> Quotations</a>

    <a href="./tracking.html"><i class="fas fa-truck"></i> Tracking</a>
    
    <!-- Logout Button -->
    <a href="#" id="logoutBtn" style="background: #dc3545; margin-top: 20px;"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<script>
// Show user info after login
function showUserInfo() {
    const currentUser = localStorage.getItem('currentUser');
    if (currentUser) {
        const user = JSON.parse(currentUser);
        document.getElementById('userInfo').style.display = 'block';
        document.getElementById('userName').textContent = user.name || user.email;
        document.getElementById('userEmail').textContent = user.email || '';
    }
}

// Logout function
document.getElementById('logoutBtn').addEventListener('click', function() {
    if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('currentUser');
        alert('Logged out successfully!');
        window.location.href = './login.html';
    }
});

// Show user info on page load
showUserInfo();
</script>
    
 
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 30px;
    }

    .sidebar {
        width: 280px;
        height: 100vh;
        background: #1e293b;
        color: white;
        position: fixed;
        left: 0;
        top: 0;
        box-shadow: 4px 0 15px rgba(0, 0, 0, 0.3);
        overflow-y: auto;
    }

    .sidebar h2 {
        text-align: center;
        padding: 30px 20px;
        font-size: 24px;
        border-bottom: 1px solid #334155;
        background: #0f172a;
    }

    .sidebar h2 i {
        margin-right: 10px;
        color: #667eea;
    }

    .sidebar nav {
        padding: 20px 0;
    }

    .sidebar nav a {
        display: block;
        color: #cbd5e1;
        text-decoration: none;
        padding: 15px 25px;
        transition: all 0.3s ease;
        border-left: 3px solid transparent;
        font-size: 15px;
    }

    .sidebar nav a i {
        margin-right: 12px;
        width: 20px;
        text-align: center;
    }

    .sidebar nav a:hover {
        background: #334155;
        color: white;
        border-left: 3px solid #667eea;
        padding-left: 35px;
    }

    .sidebar nav a.active {
        background: #334155;
        color: white;
        border-left: 3px solid #667eea;
    }

    .main-content {
        margin-left: 280px;
        max-width: 1200px;
        margin-right: auto;
    }

    .page-header {
        background: white;
        padding: 30px;
        border-radius: 15px;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .page-header h1 {
        color: #1e293b;
        font-size: 32px;
        margin-bottom: 10px;
    }

    .page-header p {
        color: #64748b;
        font-size: 16px;
    }

    .stats-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    .stat-card {
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .stat-icon {
        width: 60px;
        height: 60px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
    }

    .stat-icon.blue {
        background: #dbeafe;
        color: #2563eb;
    }

    .stat-icon.green {
        background: #d1fae5;
        color: #059669;
    }

    .stat-icon.orange {
        background: #fed7aa;
        color: #ea580c;
    }

    .stat-icon.purple {
        background: #ede9fe;
        color: #7c3aed;
    }

    .stat-info h4 {
        color: #64748b;
        font-size: 13px;
        margin-bottom: 5px;
        text-transform: uppercase;
    }

    .stat-info p {
        color: #1e293b;
        font-size: 28px;
        font-weight: 700;
    }

    .po-container {
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .po-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 2px solid #667eea;
    }

    .po-header h2 {
        color: #1e293b;
        font-size: 24px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .po-header h2 i {
        color: #667eea;
    }

    .search-add {
        display: flex;
        gap: 15px;
    }

    .search-add input {
        padding: 12px 18px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        font-size: 14px;
        transition: all 0.3s ease;
        width: 300px;
        background: #f8fafc;
    }

    .search-add input:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .add-btn {
        padding: 12px 24px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .add-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th, td {
        padding: 18px;
        border-bottom: 1px solid #e2e8f0;
        text-align: left;
    }

    th {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 13px;
        letter-spacing: 0.5px;
    }

    tr {
        transition: all 0.3s ease;
    }

    tr:hover {
        background: #f8fafc;
        transform: scale(1.01);
    }

    .po-id {
        font-weight: 700;
        color: #1e293b;
        font-size: 15px;
    }

    .po-id i {
        color: #667eea;
        margin-right: 8px;
    }

    .vendor-name {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #334155;
        font-weight: 600;
    }

    .vendor-name i {
        color: #667eea;
    }

    .amount {
        font-weight: 700;
        color: #059669;
        font-size: 16px;
    }

    .amount i {
        color: #10b981;
        margin-right: 5px;
    }

    .status-badge {
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }

    .status-badge i {
        font-size: 12px;
    }

    .approved {
        background: #d1fae5;
        color: #065f46;
    }

    .pending {
        background: #fef3c7;
        color: #92400e;
    }

    .rejected {
        background: #fee2e2;
        color: #991b1b;
    }

    .processing {
        background: #dbeafe;
        color: #1e40af;
    }

    .actions {
        display: flex;
        gap: 10px;
    }

    .action-btn {
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .view-btn {
        background: #dbeafe;
        color: #2563eb;
    }

    .view-btn:hover {
        background: #2563eb;
        color: white;
    }

    .edit-btn {
        background: #fef3c7;
        color: #ea580c;
    }

    .edit-btn:hover {
        background: #ea580c;
        color: white;
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #94a3b8;
    }

    .empty-state i {
        font-size: 70px;
        margin-bottom: 20px;
        opacity: 0.5;
    }

    .empty-state p {
        font-size: 16px;
    }

    @media (max-width: 768px) {
        .sidebar {
            width: 220px;
        }

        .main-content {
            margin-left: 220px;
            padding: 20px;
        }

        .search-add input {
            width: 200px;
        }

        th, td {
            padding: 12px 8px;
        }

        .stats-cards {
            grid-template-columns: 1fr;
        }
    }
    </style>
